      - "fix: acceptance-check y quickstart con frontmatter obsoleto (triggers:, mode:, tools:) normalizados al formato actual (context: direct + description: extendido)"
      - "fix: /compliance self-audit ya no da falsos negativos estructurales — IS_SELF_AUDIT detecta cuando projectPath === ENGINE_ROOT y marca Registered/Spec-Driven como N/A"
      - "refactor: commands/audit.md migrado a .claude/skills/audit/SKILL.md — último command legacy eliminado, concepto de slash-command-legacy desaparece del engine"
      - "refactor: 7 commands legacy eliminados del repo (adapt-ui, feedback, implement, optimize-agents, plan, prd, quality-gate); install.sh limpio sin gestión de commands"
      - "chore: manual-test skill traído al repo (vivía suelto en ~/.claude/skills/ sin versionar)"
