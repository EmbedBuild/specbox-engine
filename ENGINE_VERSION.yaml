version: 2.4.0
release_date: 2026-02-24
min_claude_code: "1.0.0"

stacks:
  flutter: "3.38+"
  react: "19.x"
  python: "3.12+"
  google-apps-script: "V8"

services:
  - supabase
  - neon
  - stripe
  - firebase
  - n8n
  - stitch-mcp
  - google-workspace

features:
  - agent-teams
  - multi-stack
  - stitch-design
  - global-commands
  - implement-autopilot
  - quality-gates
  - evidence-system

changelog:
  2.4.0:
    date: 2026-02-24
    changes:
      - "Nuevo comando /quality-gate — baseline auto-descubierto, ratchet progresivo, evidence auditable"
      - "Nuevo agente AG-08 Quality Auditor — verificación independiente de calidad"
      - "Quality gates entre fases de /implement — lint 0/0/0 bloqueante, coverage ratchet"
      - ".quality/ directorio con baseline.json, plan.md, evidence/ y reports/"
      - "Políticas: zero-tolerance (lint), ratchet (coverage/arch/deadcode), no-regression (tests)"
      - "AG-08 verifica tests reales, coverage legítimo, arquitectura, convenciones"
      - "Evidence auditable por feature con pre-gate, phase-N-gate, final-gate, report"
      - "Orchestrator actualizado con AG-08 y gates obligatorios entre fases"
      - "GLOBAL_RULES actualizado con sección Quality Gates completa"
      - "Agent Teams prompt para quality-auditor"
      - "Template quality-baseline.json.template"

  2.3.0:
    date: 2026-02-24
    changes:
      - "Nuevo comando /implement — autopilot de implementacion end-to-end"
      - "Lee plan de doc/plans/, crea rama, ejecuta fases, design-to-code si aplica, QA, PR"
      - "Soporte multi-stack: Flutter, React, Python, Google Apps Script"
      - "Commits parciales por fase, coverage check 85%+, PR automatica con gh"
      - "Flujo actualizado: /prd → /plan → /implement → done"

  2.2.0:
    date: 2026-02-24
    changes:
      - "Nuevo stack: Google Apps Script (V8 + clasp + TypeScript)"
      - "architecture/google-apps-script/ — overview, folder-structure, patterns, testing-strategy"
      - "AG-07 Apps Script Specialist — agente especializado"
      - "Deteccion de .clasp.json / appsscript.json en optimize-agents, plan y adapt-ui"
      - "Agent Teams: rol AppScriptSpecialist con prompt y file ownership"
      - "GLOBAL_RULES.md actualizado con reglas de Apps Script"
      - "Templates actualizados (CLAUDE.md, team-config, feature-generator)"

  2.1.0:
    date: 2026-02-24
    changes:
      - "/optimize-agents: nueva sección Engine Sync — detecta versión del engine y compara archivos del proyecto"
      - "Paso 0.6: localiza jps_dev_engine, compara agents/prompts/config copiados vs engine"
      - "Output audit: sección 7 Engine Sync con estado de symlinks y archivos outdated"

  2.0.1:
    date: 2026-02-24
    changes:
      - "Eliminada biblioteca uiux/ — Stitch MCP define el estilo visual libremente"
      - "AG-02 (uiux-designer) reescrito: trabaja desde diseños Stitch, sin estilos predefinidos"
      - "Limpieza de referencias a uiux/ en CLAUDE.md, README.md, docs"

  2.0.0:
    date: 2026-02-24
    changes:
      - "Reestructuracion completa: repositorio canonico del sistema agentico"
      - "Multi-stack: Flutter 3.38+, React 19.x, Python 3.12+"
      - "Agent Teams nativo (Claude Code experimental)"
      - "Integracion Google Stitch MCP para diseño UI"
      - "Patrones de infraestructura: Supabase, Neon, Stripe, Firebase, n8n"
      - "install.sh: instalacion de commands via symlinks"
      - "Comando /optimize-agents con soporte Agent Teams"
      - "Templates genericos de agentes por rol"
      - "Eliminados scripts de sync/upgrade (el engine es referencia, no herramienta)"

  1.0.0:
    date: 2025-01-15
    changes:
      - Setup inicial del engine
      - Comandos globales (prd, plan, adapt-ui)
      - GLOBAL_RULES.md para Claude Code
      - Scripts de setup y sincronizacion (eliminados en v2)
