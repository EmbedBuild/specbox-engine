changelog:
  5.24.0:
    date: 2026-04-16
    codename: "Opus 4.7 Tuning"
    changes:
      - "feat: Context budget per /implement phase expanded 8,700 → 20,000 tokens to leverage Opus 4.7 1M context window (~2% of window, previously ~4.35% of 200K). Sub-budgets rebalanced: phase desc 500→1,500, architecture 2,000→4,500, source files 5,000→11,000, stack patterns 1,000→2,500, checkpoint 200→500"
      - "feat: AG-09b Acceptance Validator upgraded sonnet → opus. Rationale: validar US completas con >3 UCs encadenados + evidencia visual embebida + PRD + git diff excede razonamiento óptimo de sonnet. Opus 4.7 reduce falsos ACCEPTED/REJECTED en criterios ambiguos"
      - "feat: AG-10 Quality Auditor (externo, /audit) upgraded sonnet → opus. Rationale: síntesis de 8 analizadores ISO 25010 + signals SpecBox + mix 60/40 maintainability genera reports >15K tokens; Opus 4.7 mejora calidad de recomendaciones priorizadas y narrativa del PDF final"
      - "docs: Updated context budget references across CLAUDE.md, rules/GLOBAL_RULES.md, README.md (ES+EN), .claude/skills/implement/SKILL.md, templates/team-config.json.template"
      - "docs: Co-Authored-By footer updated Opus 4.6 → Opus 4.7 in .claude/skills/release/SKILL.md and manual-test template"
      - "note: No model IDs are hardcoded — all references remain semantic (opus/sonnet/haiku). Harness resolves to latest Opus 4.7 automatically"


  5.23.0:
    date: 2026-04-16
    codename: "Full Mutations"
    changes:
      - "feat: 24 new MCP tools for granular spec-driven mutations — organized in 4 tiers (8+8+5+3), total tool count 114→138"
      - "feat: Tier 1 — Granular mutations: update_uc, update_uc_batch, update_us, update_ac, update_ac_batch, add_ac, delete_ac, add_uc"
      - "feat: Tier 2 — Milestone & multirepo: set_uc_milestone, set_uc_milestone_batch, set_uc_satellite, get_milestone_status, rebalance_milestones, get_satellite_queue, sync_multirepo_state, get_cross_repo_dependencies"
      - "feat: Tier 3 — Board operations: validate_ac_quality, set_ac_metadata, link_uc_parent, delete_uc, get_board_diff"
      - "feat: Tier 4 — Acceptance automation: bulk_update_hours_from_description, estimate_from_ac, milestone_acceptance_check"
      - "feat: 3 new SpecBackend ABC methods — update_acceptance_criterion, delete_acceptance_criterion, archive_item — implemented in all 3 backends"
      - "feat: Batch-first design principle — batch tools call list_items once (not per-item), granular docstrings reference batch equivalents"
      - "feat: All mutation tools idempotent — second call with same args returns reason: no_change"
      - "feat: Structured error returns — {error, code} dict instead of exceptions to MCP client"
      - "feat: Shared helpers module _mutation_helpers.py — validators, finders, merge_meta, classify_ac, compute_distribution"
      - "feat: TrelloClient extended — update_checklist_item accepts name param, new delete_checklist_item"
      - "feat: PlaneClient extended — new delete_work_item method"
      - "feat: archive_item per backend — Trello: archived list/label fallback, Plane: cancelled state+comment, FreeForm: archive.json"
      - "feat: rebalance_milestones greedy algorithm — sorts UCs by AC count, assigns to milestone with largest gap"
      - "feat: milestone_acceptance_check verdicts — GO (≥95%), CONDITIONAL_GO (≥80%), NO_GO"
      - "feat: 78 new tests across 5 test files (helpers, backends, 4 tier tool tests), 0 regressions"
      - "docs: doc/design/v5.23.0-full-mutations.md — complete technical design with 24 ACs"
  5.22.2:
    date: 2026-04-15
    codename: "Quality Audit"
    changes:
      - "fix(docker): retirar COPY commands/ del Dockerfile — el directorio fue borrado en 1cce755 pero el Dockerfile no se actualizó, tumbando todos los builds del VPS desde v5.22.1 con 'failed to compute cache key: /commands: not found'"
      - "fix(onboarding): _render_template usaba placeholders lowercase ({project_name}, {stack}) pero los templates usan UPPERCASE ({PROJECT_NAME}, {STACK}, {ENGINE_VERSION}, {DATE}, etc.) — ningún placeholder se sustituía y upgrade_project propagaba tokens crudos a los proyectos destino"
      - "fix(templates): CLAUDE.md.template tenía 'SpecBox Engine v5.6.0' hardcoded en dos sitios (header + footer) en vez de {ENGINE_VERSION}, por lo que los proyectos upgraded quedaban marcados con una versión histórica"
      - "fix(templates): quality-baseline.json.template tenía placeholders numéricos entre comillas ({COVERAGE_PERCENT}, {TOTAL_TESTS}...) que producían JSON inválido tras sustitución — reemplazados por tokens sin comillas con defaults 0"
      - "feat(onboarding): _render_template devuelve (content, unresolved_placeholders); regex con lookbehind (?<!\\$) detecta tokens UPPERCASE no sustituidos sin tocar ${SHELL_VARS} como ${FREEPIK_API_KEY}. Los call-sites propagan warnings en el response de upgrade_project para fallar ruidoso si un futuro template añade un placeholder sin registrar default"
      - "feat(onboarding): template_vars extendido con 25 claves UPPERCASE cubriendo todos los templates (CLAUDE.md, settings.json, team-config.json, quality-baseline.json) con defaults razonables ('TBD', strings vacíos, ceros)"
