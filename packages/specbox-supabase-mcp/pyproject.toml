[project]
name = "specbox-supabase-mcp"
version = "0.1.0"
description = "SpecBox MCP server for Supabase Edge Function secrets (Management API wrapper)"
authors = [{ name = "Jesús Pérez", email = "jesus.perez.developer@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "fastmcp>=0.4.0",
    "httpx>=0.27.0",
    "structlog>=24.0.0",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "respx>=0.20.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[project.scripts]
specbox-supabase-mcp = "specbox_supabase_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/specbox_supabase_mcp"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "B", "UP", "RUF"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --strict-markers"
markers = [
    "integration: integration tests requiring SUPABASE_CI_ACCESS_TOKEN + SUPABASE_CI_PROJECT_REF",
    "unit: pure unit tests with mocked httpx",
]

[tool.coverage.run]
source = ["src/specbox_supabase_mcp"]
branch = true
omit = [
    "src/specbox_supabase_mcp/server.py",
    "src/specbox_supabase_mcp/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
fail_under = 85
