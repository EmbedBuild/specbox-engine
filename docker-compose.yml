services:
  sdd-jps-engine:
    build: .
    container_name: sdd-jps-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - engine-state:/data/state
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=8000
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-}
      - LOG_FORMAT=json
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  engine-state:
